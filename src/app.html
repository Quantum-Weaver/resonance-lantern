<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <!-- maximum-scale + user-scalable lock out pinch-zoom: the Android WebView
         honors only this meta for gesture zoom, and a zoomed visual viewport
         displaces position:fixed chrome (ComfortBar ghosting mid-frame). -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Resonance Echoes</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
